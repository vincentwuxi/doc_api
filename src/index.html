<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocSight — Document Intelligence Workbench</title>
  <meta name="description" content="Extract text, metadata, and structured information from PDFs, Office documents, images, and 76+ formats. Powered by Kreuzberg.">

  <!-- Google Fonts: Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">

    <!-- ====== Header ====== -->
    <header class="app-header">
      <div class="app-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <circle cx="12" cy="15" r="3"/>
          <path d="M12 12v-2"/>
        </svg>
        <h1>DocSight</h1>
        <span class="version-badge" id="version-badge">API</span>
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary" id="btn-formats" title="View supported formats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Formats
        </button>
        <div class="status-indicator">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Connecting…</span>
        </div>
      </div>
    </header>

    <!-- ====== Sidebar ====== -->
    <aside class="app-sidebar">

      <!-- Upload Zone -->
      <div class="upload-zone" id="upload-zone">
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <h3>Drop files here</h3>
        <p>or click to browse · 76+ formats</p>
        <input type="file" id="file-input" multiple class="sr-only">
      </div>

      <!-- Options -->
      <div class="options-bar">
        <div class="option-group">
          <label for="output-format">Output</label>
          <select id="output-format">
            <option value="plain">Plain Text</option>
            <option value="markdown" selected>Markdown</option>
            <option value="html">HTML</option>
          </select>
        </div>
        <div class="option-group">
          <label for="ocr-language">OCR</label>
          <select id="ocr-language">
            <option value="eng">English</option>
            <option value="chi_sim">简体中文</option>
            <option value="chi_tra">繁體中文</option>
            <option value="jpn">日本語</option>
            <option value="kor">한국어</option>
            <option value="deu">Deutsch</option>
            <option value="fra">Français</option>
            <option value="spa">Español</option>
            <option value="rus">Русский</option>
            <option value="ara">العربية</option>
          </select>
        </div>
      </div>
      <div class="options-bar" style="padding-top: 0;">
        <button class="option-toggle" id="force-ocr" title="Force OCR even for digital documents">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Force OCR
        </button>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar hidden" id="stats-bar"></div>

      <!-- File Queue -->
      <div class="file-queue" id="file-queue"></div>

      <!-- Actions -->
      <div class="sidebar-actions">
        <button class="btn btn-primary" id="btn-extract" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Extract All
        </button>
        <button class="btn btn-secondary" id="btn-clear" title="Clear all files">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- ====== Main Content ====== -->
    <main class="app-main" id="app-main">
      <div class="empty-state">
        <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <path d="M12 18v-6"/>
          <path d="M9 15l3 3 3-3"/>
        </svg>
        <h2>Upload documents to get started</h2>
        <p>Drag & drop files into the sidebar, or click the upload zone. Supports PDF, Office documents, images, and 76+ formats.</p>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- App Script -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
